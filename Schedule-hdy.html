<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DroneBot - Schedule (Hat Yai)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
    .calendar-container { height: 600px; border-radius: 24px; overflow: hidden; position: relative; }
    .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    .header-gradient { background: linear-gradient(to right, #111827, #1f2937, #7f1d1d); }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    iframe::-webkit-scrollbar { display: none; }
    .branch-badge { display:inline-flex; align-items:center; gap:4px; background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; border-radius:999px; padding:3px 12px; font-size:11px; font-weight:900; letter-spacing:.05em; }
  </style>
  <style>body { visibility: hidden; }</style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">
  <script src="./js/auth-guard.js"></script>
  <div id="main-navbar"></div>

  <main class="flex-1 w-full p-8">

    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 p-8 rounded-[2.5rem] header-gradient shadow-2xl relative overflow-hidden">
      <div class="relative z-10">
        <div class="mb-2">
          <span class="branch-badge"><i class="fas fa-map-marker-alt text-[10px]"></i> HAT YAI BRANCH</span>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight">Schedule</h1>
        <p class="text-white/50 text-sm mt-1">Hat Yai — dronebotcenter@gmail.com</p>
      </div>
      <button onclick="openModal()"
        class="relative z-10 bg-white text-gray-900 px-8 py-4 rounded-2xl font-bold hover:bg-red-500 hover:text-white transition-all duration-300 shadow-xl transform hover:-translate-y-1">
        <i class="fas fa-plus-circle mr-2"></i> Add Event
      </button>
      <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-5 rounded-full"></div>
    </header>

    <!-- Calendar -->
    <div class="bg-white p-3 rounded-[2.5rem] shadow-xl border border-gray-100 mb-10 overflow-hidden transition-all hover:shadow-2xl">
      <div class="calendar-container">
        <iframe id="calendarIframe"
          src="https://calendar.google.com/calendar/embed?src=dronebotcenter%40gmail.com&ctz=Asia%2FBangkok&showTitle=0&showPrint=0&showTabs=0&showCalendars=0"
          style="border:0" width="100%" height="100%" frameborder="0" scrolling="no">
        </iframe>
      </div>
    </div>

    <!-- Today Activities -->
    <div class="max-w-5xl mx-auto">
      <div class="flex items-center justify-between mb-6 px-4">
        <h2 class="text-xl font-bold text-gray-800 flex items-center">
          <span class="w-2 h-8 bg-red-600 rounded-full mr-3 shadow-[0_0_10px_rgba(220,38,38,0.5)]"></span>
          Today Activities
          <span class="ml-3 branch-badge">HDY</span>
        </h2>
        <button onclick="loadTodaySummary()" class="text-gray-400 hover:text-red-600 transition-colors text-sm font-medium">
          <i class="fas fa-sync-alt mr-1"></i> Refresh
        </button>
      </div>

      <div id="todaySummaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
          <div class="flex justify-between mb-3">
            <div class="skeleton w-12 h-12 rounded-2xl"></div>
            <div class="skeleton w-16 h-6 rounded-md"></div>
          </div>
          <div class="skeleton h-6 w-3/4 mb-3"></div>
          <div class="skeleton h-4 w-1/2 mb-4"></div>
          <div class="flex justify-between"><div class="skeleton h-4 w-1/3"></div><div class="skeleton h-4 w-1/6"></div></div>
        </div>
        <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm hidden md:block"></div>
        <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm hidden lg:block"></div>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="eventModal" class="modal items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-2 bg-red-600"></div>
      <h2 class="text-3xl font-black mb-2 text-gray-800">Add Event</h2>
      <p class="text-gray-400 text-sm mb-8 font-light italic">Fill in the event details to save them to the calendar.</p>
      <form id="eventForm" class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Event Name</label>
          <input type="text" name="title" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-all">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Date</label>
          <input type="date" name="date" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Start</label>
            <input type="time" name="startTime" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">End</label>
            <input type="time" name="endTime" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Location</label>
          <input type="text" name="location" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
        </div>
        <div class="flex gap-4 mt-10">
          <button type="button" onclick="closeModal()" class="flex-1 py-4 text-gray-400 font-bold hover:text-gray-600 transition-colors">Cancel</button>
          <button type="submit" class="flex-1 py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-red-600 transition-all shadow-lg">Save</button>
        </div>
      </form>
    </div>
  </div>

<script src="./js/config.js"></script>
<script src="./js/main-navbar.js"></script>
<script>
  const BRANCH = "hdy";
  const CALENDAR_ID = "dronebotcenter@gmail.com";
  let editingEventId = null;

  function openModal(data = null) {
    document.getElementById('eventModal').style.display = 'flex';
    if (data) {
      editingEventId = data.eventId;
      document.querySelector('[name="title"]').value = data.title;
      document.querySelector('[name="date"]').value = data.rawDate;
      document.querySelector('[name="startTime"]').value = data.startTime;
      document.querySelector('[name="endTime"]').value = data.endTime;
      document.querySelector('[name="location"]').value = data.location;
    } else {
      editingEventId = null;
      document.getElementById('eventForm').reset();
    }
  }

  function closeModal() {
    document.getElementById('eventModal').style.display = 'none';
    editingEventId = null;
  }

  function deleteEvent(eventId) {
    if (!confirm("Delete this event?")) return;
    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({ action: "deleteEvent", eventId, branch: BRANCH })
    })
      .then(res => res.json())
      .then(res => {
        if (res.status === "success") {
          loadTodaySummary();
          const iframe = document.getElementById('calendarIframe');
          iframe.src = iframe.src;
        } else { alert("Delete failed"); }
      });
  }

  function loadTodaySummary() {
    const container = document.getElementById('todaySummaryContainer');
    container.innerHTML = `
      <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
        <div class="flex justify-between mb-3">
          <div class="skeleton w-12 h-12 rounded-2xl"></div><div class="skeleton w-16 h-6 rounded-md"></div>
        </div>
        <div class="skeleton h-6 w-3/4 mb-3"></div>
        <div class="skeleton h-4 w-1/2 mb-4"></div>
        <div class="flex justify-between"><div class="skeleton h-4 w-1/3"></div><div class="skeleton h-4 w-1/6"></div></div>
      </div>
      <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm hidden md:block"></div>
      <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm hidden lg:block"></div>`;

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({ action: "getActivities", view: "day", branch: BRANCH })
    })
      .then(res => res.json())
      .then(response => {
        container.innerHTML = '';
        if (response.status === "success" && response.data.length > 0) {
          response.data.forEach(act => {
            const rawDate = new Date().toISOString().split("T")[0];
            container.innerHTML += `
              <div class="group bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-xl transition-all">
                <div class="flex justify-between mb-3">
                  <div class="bg-red-50 p-3 rounded-2xl text-red-600"><i class="fas fa-clock"></i></div>
                  <div class="flex gap-2">
                    <button onclick='openModal(${JSON.stringify({...act, rawDate})})' class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                    <button onclick='deleteEvent("${act.eventId}")' class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                  </div>
                </div>
                <h3 class="font-bold text-gray-800">${act.title}</h3>
                <p class="text-xs text-gray-400 italic mb-3"><i class="fas fa-map-marker-alt mr-1"></i>${act.location || '-'}</p>
                <div class="flex justify-between text-sm font-bold">
                  <span>${act.startTime} - ${act.endTime}</span>
                  <span class="text-green-500">Live</span>
                </div>
              </div>`;
          });
        } else {
          container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-10"><i class="fas fa-calendar-times text-3xl mb-3 block opacity-30"></i>No activities today</div>`;
        }
      })
      .catch(() => {
        container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-10"><i class="fas fa-exclamation-circle text-3xl mb-3 block opacity-30"></i>Could not load activities</div>`;
      });
  }

  document.getElementById('eventForm').onsubmit = function(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Saving...`;
    btn.disabled = true;

    const formData = {
      title: e.target.title.value,
      date: e.target.date.value,
      startTime: e.target.startTime.value,
      endTime: e.target.endTime.value,
      location: e.target.location.value
    };

    const action = editingEventId ? "updateEvent" : "addEvent";
    const payload = editingEventId
      ? { action, eventId: editingEventId, data: formData, branch: BRANCH }
      : { action, data: formData, branch: BRANCH };

    fetch(scriptURL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(res => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        if (res.status === "success") {
          closeModal();
          loadTodaySummary();
          const iframe = document.getElementById('calendarIframe');
          iframe.src = iframe.src;
        } else { alert("Error: " + (res.message || "Unknown")); }
      })
      .catch(() => { btn.innerHTML = originalText; btn.disabled = false; alert("Connection error"); });
  };

  document.addEventListener('DOMContentLoaded', loadTodaySummary);
</script>
</body>
</html>
