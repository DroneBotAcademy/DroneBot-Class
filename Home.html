<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DroneBot - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; color: #1a1a1a; }
    .sidebar-item { color: #4b5563; transition: all 0.3s; }
    .sidebar-item:hover { background-color: #fef2f2; color: #e63946; }
    .sidebar-active { background-color: #e63946; color: white !important; }
    .card-white { background: white; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    .text-red-primary { color: #e63946; }
    .bg-red-primary { background-color: #e63946; }
    .header-gradient { background: linear-gradient(to right, #ffffff, #fef2f2); border-bottom: 2px solid #e63946; }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body class="flex flex-col md:flex-row min-h-screen">
  <style>body { visibility: hidden; }</style>
  <script src="./js/auth-guard.js"></script>

    <div id="main-navbar"></div>

    <!-- Main Content -->
     <main class="flex-1 w-full p-4 md:p-8">
      
      <!-- 🔥 WRAPPER ใหม่ กันชิดซ้าย + จัดกลาง -->
      <div class="max-w-7xl mx-auto w-full">

        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 p-6 md:p-8 rounded-3xl header-gradient shadow-sm mt-6">
          <div>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-900">
              WELCOME, <span id="userNameDisplay" class="text-red-primary">User</span>
            </h1>
            <p class="text-gray-500 mt-1" id="todayDateLabel">Current date...</p>
          </div>
        </header>

        <!-- CONTENT -->
        <div class="mt-6">
          <div class="card-white p-6 md:p-8 rounded-3xl">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
              <h2 class="text-xl font-bold flex items-center text-gray-800">
                <i class="fas fa-clock text-red-primary mr-3"></i> 
                Schedule: <span id="viewTitle">Today</span>
              </h2>

              <div class="flex bg-gray-100 p-1 rounded-2xl">
                <button onclick="changeView('day')" id="btn-day" class="px-4 py-2 rounded-xl text-sm font-bold transition-all bg-white shadow-sm text-red-primary">Today</button>
                <button onclick="changeView('week')" id="btn-week" class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-gray-500 hover:text-gray-700">This Week</button>
                <button onclick="changeView('all')" id="btn-all" class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-gray-500 hover:text-gray-700">All</button>
              </div>
            </div>

            <div id="activityContainer" class="space-y-4">
                <!-- Skeleton Loading -->
                <div class="flex items-center gap-4 p-5 rounded-3xl border border-gray-50 bg-white shadow-sm">
                  <div class="skeleton w-24 h-12 rounded-2xl"></div>
                  <div class="flex-1">
                    <div class="skeleton h-6 w-3/4 mb-2"></div>
                    <div class="skeleton h-4 w-1/2"></div>
                  </div>
                </div>
            </div>

          </div>
        </div>

      </div>
    </main>
  </div>

<script src="./js/config.js"></script>
<script src="./js/main-navbar.js"></script>
<script>
  let currentView = 'day';

  window.onload = function() {
    const userData = JSON.parse(localStorage.getItem('userData'));
    if(userData) {
      document.getElementById('userNameDisplay').innerText = userData.user;
      if (typeof updateMainNavbarUser === 'function') updateMainNavbarUser();
    }
    
    const now = new Date();
    document.getElementById('todayDateLabel').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    
    loadActivities();
  };

  function changeView(view) {
    currentView = view;
    const views = ['day', 'week', 'all'];
    const titles = { 'day': 'Today', 'week': 'This Week', 'all': 'All' };
    
    views.forEach(v => {
      const btn = document.getElementById(`btn-${v}`);
      if(v === view) {
        btn.classList.add('bg-white', 'shadow-sm', 'text-red-primary');
        btn.classList.remove('text-gray-500');
      } else {
        btn.classList.remove('bg-white', 'shadow-sm', 'text-red-primary');
        btn.classList.add('text-gray-500');
      }
    });
    
    document.getElementById('viewTitle').innerText = titles[view];
    loadActivities();
  }

  function loadActivities() {
    const container = document.getElementById('activityContainer');
    // Display skeleton loading
    container.innerHTML = `
      <div class="flex items-center gap-4 p-5 rounded-3xl border border-gray-50 bg-white shadow-sm">
        <div class="skeleton w-24 h-12 rounded-2xl"></div>
        <div class="flex-1">
          <div class="skeleton h-6 w-3/4 mb-2"></div>
          <div class="skeleton h-4 w-1/2"></div>
        </div>
      </div>`;

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({ 
        action: "getActivities",
        view: currentView 
      })
    })
    .then(res => res.json())
    .then(response => {
      container.innerHTML = '';
      
      if (response.status === "success" && response.data && response.data.length > 0) {

        // 🔥 Sort: ถ้าเป็น week หรือ all ให้เรียงล่าสุดขึ้นก่อน (descending)
        let sortedData = response.data;
        if (currentView === 'week' || currentView === 'all') {
          sortedData = response.data.slice().sort((a, b) => {
            const dateA = new Date(a.date + ' ' + a.startTime);
            const dateB = new Date(b.date + ' ' + b.startTime);
            return dateB - dateA;
          });
        }

        sortedData.forEach(act => {
          const dateLabel = currentView !== 'day' ? `<p class="text-[10px] font-bold text-red-400 mb-1">${act.date}</p>` : '';
          
          container.innerHTML += `
            <div class="flex items-center gap-4 p-5 rounded-3xl border border-gray-50 bg-white mb-3 shadow-sm hover:bg-red-50 transition">
              <div class="bg-red-primary text-white p-3 rounded-2xl text-center min-w-[100px]">
                <span class="text-xs font-bold block">${act.startTime} - ${act.endTime}</span> 
              </div>
              <div class="flex-1">
                ${dateLabel}
                <h3 class="font-bold text-gray-800 text-lg">${act.title}</h3>
                <p class="text-gray-400 text-xs"><i class="fas fa-map-marker-alt mr-1"></i> ${act.location}</p>
              </div>
            </div>`;
        });
      } else {
        const titles = { 'day': 'Today', 'week': 'This Week', 'all': 'All' };
        container.innerHTML = `<p class="text-gray-400 italic py-10 text-center border-2 border-dashed border-gray-100 rounded-3xl">No activities for ${titles[currentView]}</p>`;
      }
    })
    .catch(err => {
      console.error("Error:", err);
      container.innerHTML = '<p class="text-red-500 italic py-10 text-center border-2 border-dashed border-red-100 rounded-3xl">Unable to load activities</p>';
    });
  }
</script>
</body>
</html>
