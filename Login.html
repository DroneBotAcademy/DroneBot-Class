<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneBot Class - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,700;1,500;1,800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome (สำหรับไอคอนตา) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="flex flex-col md:flex-row min-h-screen">

    <!-- ซ่อนเนื้อหาก่อนจนกว่า Auth Guard จะเช็คเสร็จ -->
    <style>body { visibility: hidden; }</style>
    <script src="./js/auth-guard.js"></script>

    <div id="loginSection">
        <header class="header-banner">
            <img src="./image/logo-white.png" alt="DroneBot Logo" class="header-logo">
        </header>

        <main class="content-wrapper">

            <div class="welcome-section">
                <p class="welcome-text">welcome</p>
                <h1 class="brand-title">DroneBot <span class="text-red">Class</span></h1>
            </div>

            <div class="login-container">

                <!-- EMAIL -->
                <div class="mb-4">
                    <label class="form-label">อีเมล</label>
                    <input type="text" id="user" class="form-control">
                </div>

                <!-- PASSWORD (เพิ่มลูกตาแล้ว) -->
                <div class="mb-4">
                    <label class="form-label">รหัส</label>

                    <div style="position: relative;">
                        <input type="password" id="pass" class="form-control" style="padding-right: 45px;">

                        <button type="button" onclick="togglePassword()"
                            style="
                                position: absolute;
                                right: 10px;
                                top: 50%;
                                transform: translateY(-50%);
                                border: none;
                                background: transparent;
                                cursor: pointer;
                                color: #666;
                            ">
                            <i id="eyeIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- BUTTON -->
                <div class="text-center">
                    <button class="btn-confirm" id="loginBtn" onclick="handleLogin()">ยืนยัน</button>
                </div>

                <p id="msg" class="mt-3 text-center"></p>
            </div>

        </main>
    </div>

    <script src="./js/config.js"></script>

    <script>
        // 👁️ TOGGLE PASSWORD
        function togglePassword() {
            const pass = document.getElementById("pass");
            const icon = document.getElementById("eyeIcon");

            if (pass.type === "password") {
                pass.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                pass.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        // LOGIN FUNCTION (ของเดิมคุณ ไม่แตะ logic)
        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');
            
            if (!u || !p) {
                msg.style.color = "red";
                msg.innerText = "กรุณากรอกข้อมูลให้ครบ";
                return;
            }

            msg.style.color = "#00a8e8";
            msg.innerText = "กำลังตรวจสอบความถูกต้อง...";
            btn.disabled = true;

            try {
                const finalURL = `${authScriptURL}?action=login&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`;

                const response = await fetch(finalURL);
                const res = await response.json();

                if (res.status === "success") {
                    msg.style.color = "green";
                    msg.innerText = "เข้าสู่ระบบสำเร็จ! ยินดีต้อนรับคุณ " + res.user;

                    localStorage.setItem('userData', JSON.stringify({
                        user: res.user,
                        role: res.role,
                        email: res.email
                    }));

                    setTimeout(() => {
                        window.location.replace("Home.html"); 
                    }, 1000);

                } else {
                    msg.style.color = "red";
                    msg.innerText = res.message || "รหัสผ่านหรืออีเมลไม่ถูกต้อง";
                }

            } catch (error) {
                console.error("Error:", error);
                msg.style.color = "red";
                msg.innerText = "การเชื่อมต่อขัดข้อง (ตรวจสอบ Apps Script หรืออินเทอร์เน็ต)";
            } finally {
                btn.disabled = false;
            }
        }

        window.onload = function() {
            const userData = localStorage.getItem('userData');
            if (userData) {
                window.location.replace("Home.html");
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const messageType = urlParams.get('message');
            const msgElement = document.getElementById('msg');

            if (messageType === 'please_login') {
                msgElement.style.color = "orange";
                msgElement.innerHTML = `
                    <div style="background: #fff3cd; padding: 10px; border-radius: 12px; border: 1px solid #ffeeba;">
                        <i class="fas fa-exclamation-triangle"></i> กรุณาเข้าสู่ระบบก่อนใช้งาน
                    </div>
                `;
            }
        };
    </script>

</body>
</html>
