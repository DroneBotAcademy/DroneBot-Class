    <script>
      (function () {
        // หน้า Login: ถ้า Login อยู่แล้ว ให้ดีดไปหน้า Admin เลย ไม่ต้องให้กรอกรหัสซ้ำ

    <main class="form-signin w-100 m-auto" style="max-width: 450px">
      <div class="p-4 p-md-5 rounded-5 shadow-lg">
        <form id="loginForm">
          <img
            class="mb-4 mx-auto d-block"
            src="../image/logo.png"
            alt=""
            width="256"
            height="128"
          />
          <h1 class="h3 mb-3 fw-normal">Please sign in</h1>
          <div class="form-floating">
            <input
              type="email"
              class="form-control"
              id="floatingInput"
              placeholder="name@example.com"
            />
            <label for="floatingInput">Email address</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              id="floatingPassword"
              placeholder="Password"
            />
            <label for="floatingPassword">Password</label>
          </div>
          <div class="form-check text-start my-3">
            <input
              class="form-check-input"
              type="checkbox"
              value="remember-me"
              id="checkDefault"
            />
            <label class="form-check-label" for="checkDefault">
              Remember me
            </label>
          </div>
          <button
            class="btn btn-primary w-100 py-2"
            type="submit"
            id="submitBtn"
          >
            Sign in
          </button>
          <p class="mt-5 mb-3 text-body-secondary">&copy; โดรนบอทเทค จำกัด</p>
        </form>
      </div>
    </main>
    <!-- แยกไฟล์ Bootstrap JS ออกมา -->
    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (typeof setupAdminTheme === "function") {
          setupAdminTheme(); // โหลดแค่ theme ไม่โหลด sidebar
        }
      });
    </script>
    <!-- เขียนโค้ดควบคุมแยกต่างหากเพื่อให้ทำงานได้ -->
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const email = document.getElementById("floatingInput").value;
          const password = document.getElementById("floatingPassword").value;
          const submitBtn = document.getElementById("submitBtn");

          // ใส่ URL ที่ได้จากการ Deploy ใหม่ตรงนี้
          const webAppUrl =
            "https://script.google.com/macros/s/AKfycbwZpTz9gRdeWhbb3PBPiswXlkHxLy34Ry7VFLtbHgNKb71yfy392RZozB4JE_ERm_Of/exec";
          const url = `${webAppUrl}?action=login&user=${encodeURIComponent(email)}&pass=${encodeURIComponent(password)}`;

          // แสดงสถานะกำลังโหลด
          const originalText = submitBtn.innerText;
          submitBtn.innerText = "Checking...";
          submitBtn.disabled = true;

          fetch(url)
            .then((response) => response.json())
            .then((data) => {
              if (data.status === "success") {
                // เก็บข้อมูลลง Session ก่อนไปหน้าถัดไป
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("userFullName", data.user);

                alert("ยินดีต้อนรับคุณ " + data.user);

                // ใช้บรรทัดนี้บรรทัดเดียวเพื่อไปหน้า Dashboard
                window.location.replace("adminpage.html");
              } else {
                alert(data.message);
              }
            })
            .catch((error) => {
              console.error("Error:", error);
              alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
            })
            .finally(() => {
              submitBtn.innerText = originalText;
              submitBtn.disabled = false;
            });
        });
    </script>
